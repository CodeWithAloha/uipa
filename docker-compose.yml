version: '3.8'

services:
  db:
    image: postgis/postgis:14-3.1
    volumes:
      - pg-data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: froide
      POSTGRES_DB: froide
      POSTGRES_PASSWORD: froide
    ports:
      - "127.0.0.1:5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.15.0
    # user: "1000:1000"  # Run as non-root user

    volumes:
      - ./temp/data:/usr/share/elasticsearch/data  # Mount host directory for data
      - ./temp/logs:/usr/share/elasticsearch/logs  # Mount host directory for logs
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=true"
      - "ELASTIC_PASSWORD=froide"
      - "cluster.routing.allocation.disk.threshold_enabled=false"
      - "cluster.routing.allocation.disk.watermark.low=3gb"
      - "cluster.routing.allocation.disk.watermark.high=2gb"
      - "cluster.routing.allocation.disk.watermark.flood_stage=1gb"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # Limit JVM heap size to 512MB
    deploy:
      resources:
        limits:
          memory: 2g  # Limit Elasticsearch memory usage to 2GB
          cpus: '1.5'  # Limit Elasticsearch to 1.5 CPU cores
    ports:
      - "127.0.0.1:9200:9200"

  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    ports:
      # - "8000:8000"
      - "127.0.0.1:8000:8000"

    depends_on:
      - db
      - elasticsearch

    # command: python manage.py runserver 0.0.0.0:8000
    # command: sleep infinity # no failed build if I run this
      # - "127.0.0.1:8000:8000"
    # environment:
    #   - COMPOSE_HTTP_TIMEOUT=200

volumes:
  es-data: {}
  es-logs: {}
  pg-data: {}
